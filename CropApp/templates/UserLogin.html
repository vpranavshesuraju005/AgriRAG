{% extends 'base.html' %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
	<div class="glass-card" style="width: 100%; max-width: 450px;">
		<div style="text-align: center; margin-bottom: 2rem;">
			<i class="fas fa-user-circle" style="font-size: 3rem; color: var(--primary); margin-bottom: 1rem;"></i>
			<h2>Welcome Back</h2>
			<p style="color: var(--text-dim);">Access your AgriRAG dashboard</p>
		</div>

		{% if data %}
		<div
			style="padding: 1rem; background: rgba(231, 76, 60, 0.2); border-radius: 10px; margin-bottom: 1.5rem; color: #ff7675; text-align: center;">
			{{ data }}
		</div>
		{% endif %}

		<form action="{% url 'UserLoginAction' %}" method="post">
			{% csrf_token %}
			<div style="margin-bottom: 1.5rem;">
				<label
					style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; font-weight: 500;">Username</label>
				<input type="text" name="t1" placeholder="Enter your username" required>
			</div>
			<div style="margin-bottom: 2rem;">
				<label
					style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; font-weight: 500;">Password</label>
				<input type="password" name="t2" placeholder="••••••••" required>
			</div>
			<button type="submit" class="btn btn-primary"
				style="width: 100%; padding: 1rem; font-size: 1.1rem; border-radius: 10px;">Login to Dashboard</button>
		</form>

		<div style="margin-top: 2rem; text-align: center; font-size: 0.9rem; color: var(--text-dim);">
			Don't have an account? <a href="{% url 'Signup' %}"
				style="color: var(--primary); text-decoration: none; font-weight: 600;">Join now</a>
		</div>
	</div>
</div>
{% endblock %}
